<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLaMA Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0;
    --text2: #8b90a0;
    --text3: #555a6e;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --green: #22c55e;
    --red: #ef4444;
    --user-bg: #1e3a5f;
    --user-text: #93c5fd;
    --ai-bg: #1a1d27;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }

  .header-left { display: flex; align-items: center; gap: 10px; }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
  }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.checking { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }

  .header-actions { display: flex; gap: 8px; }

  .btn-icon {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--text2);
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; gap: 5px;
    transition: all 0.15s;
  }
  .btn-icon:hover { background: var(--surface2); color: var(--text); }

  /* CONFIG PANEL */
  #config-panel {
    display: none;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    gap: 12px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  #config-panel.open { display: flex; }

  .cfg-field { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
  .cfg-field label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
  .cfg-field input {
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .cfg-field input:focus { border-color: var(--blue); }

  .btn-save {
    background: var(--blue);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: white;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-save:hover { background: var(--blue-dark); }

  /* MESSAGES */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--text3);
    text-align: center;
    padding: 40px;
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state h3 { font-size: 16px; font-weight: 500; color: var(--text2); }
  .empty-state p { font-size: 13px; line-height: 1.6; max-width: 320px; }

  .msg-row { display: flex; gap: 10px; max-width: 820px; width: 100%; }
  .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.assistant { align-self: flex-start; }

  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .msg-row.user .avatar { background: #1e3a5f; color: #93c5fd; }
  .msg-row.assistant .avatar { background: #14281e; color: #4ade80; }

  .msg-body { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .msg-row.user .msg-body { align-items: flex-end; }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.65;
    max-width: 680px;
    word-wrap: break-word;
    white-space: pre-wrap;
  }
  .msg-row.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }
  .msg-row.assistant .bubble {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble.error {
    background: rgba(239,68,68,0.1);
    color: #fca5a5;
    border-color: rgba(239,68,68,0.2);
  }

  .msg-time { font-size: 11px; color: var(--text3); padding: 0 4px; }

  /* TYPING INDICATOR */
  .typing-bubble {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 16px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text2);
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* INPUT */
  #input-area {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    resize: none;
    min-height: 44px;
    max-height: 140px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }
  #msg-input:focus { border-color: var(--blue); }
  #msg-input::placeholder { color: var(--text3); }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--blue);
    color: white;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  #send-btn:hover:not(:disabled) { background: var(--blue-dark); transform: scale(1.05); }
  #send-btn:disabled { background: var(--surface2); cursor: not-allowed; opacity: 0.5; }

  #send-btn svg { width: 18px; height: 18px; }

  .hint { font-size: 11px; color: var(--text3); text-align: center; padding: 6px 0 0; }

  @media (max-width: 600px) {
    header { padding: 12px 14px; }
    #messages { padding: 14px; gap: 12px; }
    #input-area { padding: 12px 14px; }
    .bubble { font-size: 13px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="status-dot checking" id="status-dot"></div>
    <div>
      <div class="header-title">LLaMA Chat</div>
      <div class="header-sub" id="status-label">connecting...</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="clear-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
      Clear
    </button>
    <button class="btn-icon" id="config-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Config
    </button>
  </div>
</header>

<div id="config-panel">
  <div class="cfg-field">
    <label>API URL</label>
    <input type="text" id="cfg-url" placeholder="https://your-ngrok-url.ngrok-free.app" />
  </div>
  <div class="cfg-field">
    <label>API Key</label>
    <input type="password" id="cfg-key" placeholder="llama-..." />
  </div>
  <button class="btn-save" id="cfg-save">Save & connect</button>
</div>

<div id="messages">
  <div class="empty-state" id="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <h3>Start a conversation</h3>
    <p>Set your API URL and key in Config, then type a message below.</p>
  </div>
</div>

<div id="input-area">
  <textarea id="msg-input" placeholder="Type a message... (Enter to send, Shift+Enter for new line)" rows="1"></textarea>
  <button id="send-btn" disabled aria-label="Send">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
  const DEFAULT_URL = 'https://hurt-immerse-onion.ngrok-free.dev';

  let apiUrl = localStorage.getItem('llama_url') || DEFAULT_URL;
  let apiKey  = localStorage.getItem('llama_key') || '';
  let isLoading = false;

  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('msg-input');
  const sendBtn     = document.getElementById('send-btn');
  const emptyState  = document.getElementById('empty-state');
  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const cfgUrl      = document.getElementById('cfg-url');
  const cfgKey      = document.getElementById('cfg-key');

  cfgUrl.value = apiUrl;
  cfgKey.value = apiKey;

  function setStatus(state, label) {
    statusDot.className = 'status-dot ' + (state === 'online' ? '' : state === 'offline' ? 'offline' : 'checking');
    statusLabel.textContent = label;
  }

  async function checkServer() {
    setStatus('checking', 'connecting...');
    try {
      const r = await fetch(apiUrl + '/', {
        signal: AbortSignal.timeout(5000),
        headers: { 'ngrok-skip-browser-warning': '1' }
      });
      const d = await r.json();
      setStatus('online', d.model || 'connected');
      if (apiKey) sendBtn.disabled = false;
    } catch {
      setStatus('offline', 'server offline — is it running?');
    }
  }

  document.getElementById('config-btn').onclick = () => {
    document.getElementById('config-panel').classList.toggle('open');
  };

  document.getElementById('cfg-save').onclick = async () => {
    apiUrl = cfgUrl.value.trim().replace(/\/$/, '');
    apiKey = cfgKey.value.trim();
    localStorage.setItem('llama_url', apiUrl);
    localStorage.setItem('llama_key', apiKey);
    await checkServer();
    document.getElementById('config-panel').classList.remove('open');
  };

  document.getElementById('clear-btn').onclick = () => {
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyState);
    emptyState.style.display = '';
  };

  function now() {
    return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function addMessage(role, text, isError) {
    emptyState.style.display = 'none';

    const row = document.createElement('div');
    row.className = 'msg-row ' + role;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'You' : 'AI';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error' : '');
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();

    body.appendChild(bubble);
    body.appendChild(time);
    row.appendChild(avatar);
    row.appendChild(body);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  function showTyping() {
    emptyState.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'msg-row assistant';
    row.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';

    const body = document.createElement('div');
    body.className = 'msg-body';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

    body.appendChild(bubble);
    row.appendChild(avatar);
    row.appendChild(body);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    if (!apiKey) {
      addMessage('assistant', 'Please open Config and enter your API key first.', true);
      return;
    }

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;

    addMessage('user', text);
    showTyping();

    try {
      const res = await fetch(apiUrl + '/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'ngrok-skip-browser-warning': '1'
        },
        body: JSON.stringify({ message: text, max_tokens: 512, temperature: 0.7 })
      });

      removeTyping();

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        addMessage('assistant', 'Error ' + res.status + ': ' + (err.detail || 'Request failed'), true);
      } else {
        const data = await res.json();
        addMessage('assistant', data.response || '(empty response)');
      }
    } catch (e) {
      removeTyping();
      addMessage('assistant', 'Could not reach server. Check your URL and make sure the server + ngrok are running.', true);
    }

    isLoading = false;
    if (apiKey) sendBtn.disabled = false;
  }

  sendBtn.onclick = sendMessage;

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    sendBtn.disabled = isLoading || !inputEl.value.trim() || !apiKey;
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  checkServer();
</script>
</body>
</html>
